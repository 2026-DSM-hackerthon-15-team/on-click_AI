services:
  app:
    image: python:3.10-slim
    volumes:
      - ./:/app
    working_dir: /app
    command: bash -c "python -m pip install --no-cache-dir -r requirements.txt && python -m src.main"
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-secret}
      BACKEND_AUTH_TOKEN: ${BACKEND_AUTH_TOKEN:-}
      API_BASE_URL: ${API_BASE_URL:-http://127.0.0.1:8000}
      AI_SERVICE_URL: http://127.0.0.1:8001
      MCP_SERVICE_URL: http://127.0.0.1:8002
      STATS_SERVICE_URL: http://127.0.0.1:8003
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_API_KEY: ${AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      AI_BASE_URL: ${AI_BASE_URL:-}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-10}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-45}
      INSTAGRAM_PROVIDER: ${INSTAGRAM_PROVIDER:-mock}
      BROWSER_MCP_URL: ${BROWSER_MCP_URL:-}
      BROWSER_MCP_TOOL: ${BROWSER_MCP_TOOL:-instagram_publish}
      INSTAGRAM_PUBLISH_TIMEOUT_SECONDS: ${INSTAGRAM_PUBLISH_TIMEOUT_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
